name: Slice request
description: Propose the next concrete validation or ingestion slice.
title: "[slice] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete gap in the current engine surface.
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Fixture or corpus candidate
      description: Point to the fixture, corpus sample, or profile-pack data that should drive the work.
      placeholder: fixtures/synthetic/taxonomy/...
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: State the expected receipt, finding, exit code, or JSON output.
    validations:
      required: true
  - type: input
    id: scenario
    attributes:
      label: Proposed AC or scenario ID
      description: If you already know the target AC or scenario, include it here.
      placeholder: AC-XK-TAXONOMY-003
