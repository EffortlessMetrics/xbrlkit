coverage:
  precision: 2
  round: down
  range: "50...85"
  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
        flags:
          - rust-alpha
    patch:
      default:
        target: 70%
        threshold: 20%
        informational: true
        flags:
          - rust-alpha
comment: false
github_checks:
  annotations: false
ignore:
  - "target/**"
  - "fixtures/**"
  - "corpus/**"
  - "profiles/**"
  - "contracts/**"
  - "specs/**"
  - "crates/*/benches/**"
  - "crates/*/examples/**"
